---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-cloud
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: grafana-cloud-credentials
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        PROMETHEUS_ENDPOINT: "http://metrics.internal"
  dataFrom:
    - extract:
        key: observability-vm
