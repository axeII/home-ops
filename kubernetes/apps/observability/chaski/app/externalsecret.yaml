---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: chaski
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: chaski-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        PUSHOVER_URL: '{{ printf "pover://%s@%s" .PUSHOVER_USER_KEY .GATUS_PUSHOVER_TOKEN }}'
  dataFrom:
    - extract:
        key: pushover
