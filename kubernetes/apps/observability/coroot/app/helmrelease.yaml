---
# yaml-language-server: $schema=https://datreeio.github.io/CRDs-catalog/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: coroot
  namespace: observability
spec:
  interval: 15m
  timeout: 15m
  chart:
    spec:
      chart: coroot-ce
      version: 0.3.3
      sourceRef:
        kind: HelmRepository
        name: coroot
        namespace: flux-system
  maxHistory: 3
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  valuesFrom:
    - kind: Secret
      name: coroot-secret
      valuesKey: COROOT_ADMIN_PASSWORD
      targetPath: authBootstrapAdminPassword
  values:
    metricsRefreshInterval: 60s
    env:
      - name: GLOBAL_PROMETHEUS_URL
        value: http://vmsingle-vm.observability.svc.cluster.local:8428
      - name: GLOBAL_PROMETHEUS_REMOTE_WRITE_URL
        value: http://vmsingle-vm.observability.svc.cluster.local:8428/api/v1/write
      - name: CACHE_TTL
        value: 24h
    ingress:
      enabled: false
    prometheus:
      enabled: false
    clusterAgent:
      resources:
        requests:
          cpu: 10m
          memory: 100Mi
          ephemeral-storage: 100Mi
        limits:
          memory: 300Mi
          ephemeral-storage: 200Mi
    storage:
      className: ceph-block
      size: 10Gi
    clickhouse:
      keeper:
        replicas: 1
      storage:
        className: ceph-block
        size: 20Gi
      resources:
        requests:
          cpu: 400m
          memory: 1Gi
          ephemeral-storage: 100Mi
        limits:
          memory: 3Gi
          ephemeral-storage: 200Mi
    node-agent:
      resources:
        requests:
          cpu: 200m
          memory: 500Mi
          ephemeral-storage: 100Mi
        limits:
          memory: 1.2Gi
          ephemeral-storage: 200Mi
