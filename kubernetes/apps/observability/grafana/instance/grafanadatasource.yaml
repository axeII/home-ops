---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/grafana.integreatly.org/grafanadatasource_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: grafanacloud-prometheus
  labels:
    dashboards: grafana
spec:
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      dashboards: grafana
  datasource:
    name: GrafanaCloud
    type: prometheus
    access: proxy
    url: https://prometheus-prod-65-prod-eu-west-2.grafana.net/api/prom
    basicAuth: true
    basicAuthUser: "{{ .GRAFANA_CLOUD_PROMETHEUS_USER }}"
  valuesFrom:
    - targetPath: "datasource.secureJsonData.basicAuthPassword"
      valueFrom:
        secretKeyRef:
          name: grafana-cloud-credentials
          key: GRAFANA_CLOUD_API_TOKEN
