---
# yayamlls-disable-file
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: minecraft-scheduled
spec:
  scaleTargetRef:
    name: minecraft
  minReplicaCount: 0
  cooldownPeriod: 300
  triggers:
    - type: cron
      metadata:
        timezone: Europe/Paris
        start: 0 7 * * *
        end: 0 3 * * *
        desiredReplicas: "1"
