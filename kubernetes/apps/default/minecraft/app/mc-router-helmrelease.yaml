---
# yaml-language-server: $schema=https://crd.movishell.pl/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mc-router
spec:
  chartRef:
    kind: OCIRepository
    name: mc-router
  interval: 1h
  values:
    minecraftRouter:
      autoScale:
        up:
          enabled: true
        down:
          enabled: true
          after: "30m"
    resources:
      limits:
        memory: 64Mi
      requests:
        cpu: 5m
        memory: 16Mi
    services:
      minecraft:
        type: LoadBalancer
        port: 25565
        annotations:
          lbipam.cilium.io/ips: "192.168.69.102"
