---
apiVersion: v1
kind: Service
metadata:
  name: &app grafana
  namespace: external
  labels:
    app.kubernetes.io/name: *app
    app.kubernetes.io/instance: *app
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: grafana-nginx
  ports:
    - port: 443
      protocol: TCP
      targetPort: 8080
