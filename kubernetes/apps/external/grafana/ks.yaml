---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: external-grafana
  namespace: external
spec:
  dependsOn:
    - name: cilium-gateway
      namespace: kube-system
  path: ./kubernetes/apps/external/grafana/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  healthChecks:
    - apiVersion: v1
      kind: Service
      name: grafana
      namespace: external
  interval: 30m
  retryInterval: 1m
  timeout: 3m
