---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: konflate
spec:
  chartRef:
    kind: OCIRepository
    name: konflate
  interval: 1h
  values:
    config:
      repo: github://axeII/home-ops
      statusChecks: true
      prComments: true
      publicUrl: https://konflate.juno.moe
      mcp: true
    secret:
      existingSecret: konflate-secret
    httpRoute:
      enabled: true
      annotations:
        glance/show: "true"
        glance/name: Konflate
        glance/icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/kubernetes.png
        glance/description: "Pull request review and validation."
      parentRefs:
        - name: external
          namespace: kube-system
          sectionName: https
      hostnames:
        - konflate.juno.moe
    monitoring:
      serviceMonitor:
        enabled: true
    resources:
      requests:
        cpu: 50m
      limits:
        memory: 1Gi
