---
apiVersion: tuppr.home-operations.com/v1alpha1
kind: TalosUpgrade
metadata:
  name: cluster
spec:
  talos:
    # renovate: datasource=docker depName=ghcr.io/siderolabs/installer
    version: v1.13.6
  policy:
    debug: false
    force: false
    rebootMode: default
    placement: hard
    timeout: 30m
    stage: false
  parallelism: 1
  maintenance:
    windows:
      - start: "0 2 * * 0"
        duration: "4h"
        timezone: "Europe/Paris"
  healthChecks:
    - apiVersion: v1
      kind: Node
      expr: status.conditions.exists(c, c.type == "Ready" && c.status == "True")
    - apiVersion: ceph.rook.io/v1
      kind: CephCluster
      name: rook-ceph
      namespace: rook-ceph
      expr: status.ceph.health in ["HEALTH_OK"]
