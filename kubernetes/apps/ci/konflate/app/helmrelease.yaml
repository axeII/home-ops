---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: konflate
  namespace: ci
spec:
  interval: 30m
  timeout: 10m
  chart:
    spec:
      chart: konflate
      sourceRef:
        kind: HelmRepository
        name: home-operations
        namespace: flux-system
  maxHistory: 3
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  valuesFrom:
    - kind: Secret
      name: konflate-secret
      valuesKey: KONFLATE_APP_CLIENT_ID
      targetPath: secret.appClientId
    - kind: Secret
      name: konflate-secret
      valuesKey: KONFLATE_APP_PRIVATE_KEY
      targetPath: secret.appPrivateKey
  values:
    config:
      repo: github://axeII/home-ops
      clusterPath: kubernetes
      statusChecks: true
      prComments: true
      publicUrl: https://konflate.juno.moe
      restrictEgress: true
      mcp: true
    persistence:
      cache:
        enabled: true
        size: 5Gi
        storageClassName: ceph-block
