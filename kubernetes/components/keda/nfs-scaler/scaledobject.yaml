---
# yayamlls-disable-file
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: ${APP}
spec:
  advanced:
    restoreToOriginalReplicaCount: true
  cooldownPeriod: 0
  minReplicaCount: 0
  maxReplicaCount: 1
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ${APP}
  triggers:
    - type: prometheus
      metadata:
        serverAddress: https://prometheus-prod-65-prod-eu-west-2.grafana.net/api/prom
        authModes: basic
        query: probe_success{instance=~".+:2049"}
        threshold: "1"
        ignoreNullValues: "0"
      authenticationRef:
        kind: ClusterTriggerAuthentication
        name: keda-prometheus-credentials
