---
name: Yayamlls

on:
  pull_request:
    branches: ["main"]
    paths: ["kubernetes/**"]

jobs:
  validate:
    name: Yayamlls - Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Install yayamlls
        run: go install github.com/home-operations/yayamlls/cmd/yayamlls@0.1.11

      - name: Validate manifests
        run: |
          export PATH="$(go env GOPATH)/bin:$PATH"
          yayamlls validate kubernetes/
