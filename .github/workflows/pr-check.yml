---
name: PR Check

on:
  pull_request:
    branches: ["main"]

jobs:
  scan:
    name: checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v47.0.6
      - uses: harupy/find-trailing-whitespace@56310d70ae8fd21afec8d4307d2d9ab6c15e7c5d # master
      - name: "Gitleaks checks"
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: "Copy changed files"
        run: |
          mkdir testfiles
          for file in ${{ steps.changed-files.outputs.all_changed_files }}; do
            if [[ "$file" == .github/* ]]; then
              continue
            fi
            if [ -f "$file" ]; then
              cp --parents "$file" testfiles
            fi
          done
      - name: "Yamllint checks"
        uses: karancode/yamllint-github-action@4052d365f09b8d34eb552c363d1141fd60e2aeb2 # master
        with:
          yamllint_config_filepath: .github/linters/.yamllint.yaml
          yamllint_file_or_dir: "testfiles"
          yamllint_strict: false
          yamllint_comment: true
        env:
          GITHUB_ACCESS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
