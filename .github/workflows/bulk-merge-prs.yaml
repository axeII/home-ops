---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: "Bulk Merge PRs"

on:
  workflow_dispatch:
    inputs:
      dryRun:
        description: Dry Run
        default: "false"
        required: false
      labels:
        description: Labels
        default: "any"
        required: false

jobs:
  bulk-merge-prs:
    name: Bulk Merge PRs
    runs-on: ubuntu-latest
    steps:
      - name: Generate Token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        id: app-token
        with:
          app-id: "${{ secrets.BOT_APP_ID }}"
          private-key: "${{ secrets.BOT_APP_PRIVATE_KEY }}"

      - name: Checkout
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          token: "${{ steps.app-token.outputs.token }}"

      - name: Merge
        shell: bash
        env:
          GITHUB_TOKEN: "${{ steps.app-token.outputs.token }}"
        run: |
          args=()
          args+=(--state open)
          args+=(--app bot-akira)
          args+=(--search "-label:hold -label:type/major -label:type/minor -label:area/talos")
          if [ "${{ github.event.inputs.labels }}" != "any" ]; then
              IFS=',' read -ra labels <<< "${{ github.event.inputs.labels }}"
              for label in "${labels[@]}"; do
                  args+=(--label "${label}")
              done
          fi
          for row in $(gh pr list "${args[@]}" --jq '.[] | {number, title}' --json number,title | jq -r '[.number, .title] | @tsv'); do
              IFS=$'\t' read -r id title <<< "$row"
              if echo "${title}" | grep -qiE "rook-ceph|flux|dragonfly"; then
                  echo "Skipping #${id} (manual: rook-ceph/flux/dragonfly)"
                  continue
              fi
              if [ "${{ github.event.inputs.dryRun }}" = "true" ]; then
                  echo "Dry run: gh pr merge $id --squash"
                  continue
              fi
              gh pr merge "${id}" --squash
              sleep 2
          done
